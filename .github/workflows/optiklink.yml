name: OptikLink 每日自动登录

on:
  schedule:
    # 每天 UTC 01:00 运行（北京时间 09:00）
    - cron: "0 1 * * *"
  workflow_dispatch:   # 允许手动触发，方便测试

jobs:
  auto-login:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install requests

      - name: 执行自动登录脚本
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          WXPUSHER_TOKEN: ${{ secrets.WXPUSHER_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
        run: python optiklink_login.py
