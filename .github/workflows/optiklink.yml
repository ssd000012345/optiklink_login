name: OptikLink 每日自动登录

on:
  schedule:
    - cron: "0 1 * * *"   # 每天 UTC 01:00（北京时间 09:00）
  workflow_dispatch:

jobs:
  auto-login:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install requests cloudscraper "requests[socks]"

      - name: 下载并启动 Xray 代理
        env:
          V2RAY_CONFIG: ${{ secrets.V2RAY_CONFIG }}
        run: |
          curl -sL https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip xray.zip && chmod +x xray
          echo "$V2RAY_CONFIG" > config.json
          ./xray run -c config.json &
          sleep 5
          echo "=== 直连 IP ==="
          curl -s --max-time 5 ifconfig.me || echo "获取失败"
          echo ""
          echo "=== 代理 IP（SOCKS5 10808）==="
          curl -s --max-time 5 --socks5 127.0.0.1:10808 ifconfig.me || echo "获取失败"
          echo ""

      - name: 执行自动登录脚本
        id: login
        env:
          DISCORD_TOKEN:        ${{ secrets.DISCORD_TOKEN }}
          WXPUSHER_TOKEN:       ${{ secrets.WXPUSHER_TOKEN }}
          WXPUSHER_UID:         ${{ secrets.WXPUSHER_UID }}
          DISCORD_CLIENT_ID:    ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_REDIRECT_URI: ${{ secrets.DISCORD_REDIRECT_URI }}
          EXPIRE_DATE:          ${{ secrets.EXPIRE_DATE }}
          PROXY_URL:            "socks5h://127.0.0.1:10808"
        run: python optiklink_login.py

      - name: 自动更新 DISCORD_CLIENT_ID Secret
        if: steps.login.outputs.new_client_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_CID:  ${{ steps.login.outputs.new_client_id }}
        run: |
          echo "检测到新 client_id，正在自动更新 Secret..."
          gh secret set DISCORD_CLIENT_ID --body "$NEW_CID" --repo "$GITHUB_REPOSITORY"
          echo "✅ Secret DISCORD_CLIENT_ID 已自动更新"

  cleanup-old-runs:
    runs-on: ubuntu-latest
    needs: auto-login
    if: always()
    permissions:
      actions: write
    steps:
      - name: 删除多余的 workflow run（保留最新 2 条）
        uses: actions/github-script@v7
        with:
          script: |
            const KEEP = 2;
            const workflowName = "OptikLink 每日自动登录";
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo:  context.repo.repo,
            });
            const wf = workflows.data.workflows.find(w => w.name === workflowName);
            if (!wf) {
              console.log("未找到 workflow，跳过清理");
              return;
            }
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                workflow_id: wf.id,
                per_page:    100,
              }
            );
            const toDelete = runs.slice(KEEP);
            console.log(`共 ${runs.length} 条 run，保留 ${KEEP} 条，删除 ${toDelete.length} 条`);
            for (const run of toDelete) {
              await github.rest.actions.deleteWorkflowRun({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                run_id: run.id,
              });
              console.log(`已删除 run #${run.run_number} (id=${run.id})`);
            }
